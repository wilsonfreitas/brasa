id: brasa-industry-sectors
description: >
    Industry sector lookup table derived from staging.brasa-companies.
    Maps B3 sector hierarchy (sector, subsector) to standard
    taxonomies (GICS, ICB) and a normalized English sector/subsector model.

etl:
    pipeline:
        - step: sql_query
          datasets:
              - staging.brasa-companies
          query: |+
              -- Industry sector lookup table
              --
              -- Derives distinct (sector, subsector) pairs from staging.brasa-companies
              -- and maps each pair to GICS, ICB, normalized_sector, and normalized_subsector.
              --
              -- Output columns:
              -- - sector: B3 primary sector (Portuguese label, trimmed)
              -- - subsector: B3 subsector (Portuguese label, trimmed)
              -- - gics_sector: GICS standard sector (from sector)
              -- - icb_sector: ICB standard sector (from sector)
              -- - normalized_sector: English normalized name for sector
              -- - normalized_subsector: English normalized subsector from (sector, subsector)
              WITH base AS (
                  SELECT DISTINCT
                      TRIM(sector) AS sector,
                      TRIM(subsector) AS subsector
                  FROM 'staging.brasa-companies'
                  WHERE sector IS NOT NULL
                    AND TRIM(sector) <> ''
              )
              SELECT
                  sector,
                  subsector,
                  -- GICS (Global Industry Classification Standard) mapping from sector
                  CASE sector
                      WHEN 'Financeiro'                      THEN 'Financials'
                      WHEN 'Bens Industriais'                THEN 'Industrials'
                      WHEN 'Materiais Básicos'               THEN 'Materials'
                      WHEN 'Consumo Cíclico'                 THEN 'Consumer Discretionary'
                      WHEN 'Consumo não Cíclico'             THEN 'Consumer Staples'
                      WHEN 'Utilidade Pública'               THEN 'Utilities'
                      WHEN 'Petróleo. Gás e Biocombustíveis' THEN 'Energy'
                      WHEN 'Saúde'                           THEN 'Health Care'
                      WHEN 'Tecnologia da Informação'        THEN 'Information Technology'
                      WHEN 'Comunicações'                    THEN 'Communication Services'
                      WHEN 'Imobiliário'                     THEN 'Real Estate'
                      WHEN 'Construção e Transporte'         THEN 'Industrials'
                      WHEN 'Outros'                          THEN 'Other'
                      WHEN 'Não Classificados'               THEN 'Unclassified'
                      WHEN 'Carga Inicial'                   THEN 'Unclassified'
                      ELSE 'Unclassified'
                  END AS gics_sector,
                  -- ICB (Industry Classification Benchmark) mapping from sector
                  CASE sector
                      WHEN 'Financeiro'                      THEN 'Financials'
                      WHEN 'Bens Industriais'                THEN 'Industrials'
                      WHEN 'Materiais Básicos'               THEN 'Basic Materials'
                      WHEN 'Consumo Cíclico'                 THEN 'Consumer Goods'
                      WHEN 'Consumo não Cíclico'             THEN 'Consumer Services'
                      WHEN 'Utilidade Pública'               THEN 'Utilities'
                      WHEN 'Petróleo. Gás e Biocombustíveis' THEN 'Oil & Gas'
                      WHEN 'Saúde'                           THEN 'Health Care'
                      WHEN 'Tecnologia da Informação'        THEN 'Technology'
                      WHEN 'Comunicações'                    THEN 'Telecommunications'
                      WHEN 'Imobiliário'                     THEN 'Real Estate'
                      WHEN 'Construção e Transporte'         THEN 'Industrials'
                      WHEN 'Outros'                          THEN 'Other'
                      WHEN 'Não Classificados'               THEN 'Unclassified'
                      WHEN 'Carga Inicial'                   THEN 'Unclassified'
                      ELSE 'Unclassified'
                  END AS icb_sector,
                  -- Normalized English sector name (1-to-1 translation of sector)
                  CASE sector
                      WHEN 'Financeiro'                      THEN 'Financials'
                      WHEN 'Bens Industriais'                THEN 'Industrials'
                      WHEN 'Materiais Básicos'               THEN 'Materials'
                      WHEN 'Consumo Cíclico'                 THEN 'Consumer Discretionary'
                      WHEN 'Consumo não Cíclico'             THEN 'Consumer Staples'
                      WHEN 'Utilidade Pública'               THEN 'Utilities'
                      WHEN 'Petróleo. Gás e Biocombustíveis' THEN 'Energy'
                      WHEN 'Saúde'                           THEN 'Health Care'
                      WHEN 'Tecnologia da Informação'        THEN 'Information Technology'
                      WHEN 'Comunicações'                    THEN 'Communication Services'
                      WHEN 'Imobiliário'                     THEN 'Real Estate'
                      WHEN 'Construção e Transporte'         THEN 'Construction & Transportation'
                      WHEN 'Outros'                          THEN 'Other'
                      WHEN 'Não Classificados'               THEN 'Unclassified'
                      WHEN 'Carga Inicial'                   THEN 'Unclassified'
                      ELSE 'Unclassified'
                  END AS normalized_sector,
                  -- Normalized English subsector from (sector, subsector) tuple
                  CASE
                      -- Financeiro
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Intermediários Financeiros'        THEN 'Banking'
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Previdência e Seguros'             THEN 'Insurance & Pension Funds'
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Exploração de Imóveis'             THEN 'Real Estate'
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Securitizadoras de Recebíveis'     THEN 'Asset Management & Investment'
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Serviços Financeiros Diversos'     THEN 'Financial Services'
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Holdings Diversificadas'           THEN 'Holding Companies'
                      WHEN sector = 'Financeiro'
                           AND subsector = 'Serviços Diversos'                 THEN 'Financial Services'
                      -- Bens Industriais
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Material de Transporte'            THEN 'Transportation Equipment'
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Máquinas e Equipamentos'           THEN 'Machinery & Equipment'
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Transporte'                        THEN 'Transportation Services'
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Construção e Engenharia'           THEN 'Construction'
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Serviços'                          THEN 'Industrial Services'
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Comércio'                          THEN 'Trade & Distribution'
                      WHEN sector = 'Bens Industriais'
                           AND subsector = 'Tecnologia da Informação'          THEN 'Technology'
                      -- Materiais Básicos
                      WHEN sector = 'Materiais Básicos'
                           AND subsector = 'Siderurgia e Metalurgia'           THEN 'Steel & Metals'
                      WHEN sector = 'Materiais Básicos'
                           AND subsector = 'Mineração'                         THEN 'Mining'
                      WHEN sector = 'Materiais Básicos'
                           AND subsector = 'Químicos'                          THEN 'Chemicals'
                      WHEN sector = 'Materiais Básicos'
                           AND subsector = 'Madeira e Papel'                   THEN 'Timber & Pulp'
                      WHEN sector = 'Materiais Básicos'
                           AND subsector = 'Embalagens'                        THEN 'Packaging'
                      WHEN sector = 'Materiais Básicos'
                           AND subsector = 'Materiais Diversos'                THEN 'Other Materials'
                      -- Consumo Cíclico
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Automóveis e Motocicletas'         THEN 'Automobiles'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Comércio'                          THEN 'Retail'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Construção Civil'                  THEN 'Real Estate Development'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Hoteis e Restaurantes'             THEN 'Hotels & Restaurants'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Tecidos. Vestuário e Calçados'     THEN 'Apparel & Footwear'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Utilidades Domésticas'             THEN 'Home Appliances & Furnishings'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Viagens e Lazer'                   THEN 'Leisure & Travel'
                      WHEN sector = 'Consumo Cíclico'
                           AND subsector = 'Diversos'                          THEN 'Diversified Consumer'
                      -- Consumo não Cíclico
                      WHEN sector = 'Consumo não Cíclico'
                           AND subsector = 'Agropecuária'                      THEN 'Agriculture'
                      WHEN sector = 'Consumo não Cíclico'
                           AND subsector = 'Alimentos Processados'             THEN 'Food & Beverage'
                      WHEN sector = 'Consumo não Cíclico'
                           AND subsector = 'Bebidas'                           THEN 'Beverages'
                      WHEN sector = 'Consumo não Cíclico'
                           AND subsector = 'Comércio e Distribuição'           THEN 'Retail & Distribution'
                      WHEN sector = 'Consumo não Cíclico'
                           AND subsector = 'Produtos de Uso Pessoal e de Limpeza' THEN 'Personal Care & Hygiene'
                      WHEN sector = 'Consumo não Cíclico'
                           AND subsector = 'Diversos'                          THEN 'Diversified Consumer'
                      -- Utilidade Pública
                      WHEN sector = 'Utilidade Pública'
                           AND subsector = 'Energia Elétrica'                  THEN 'Electric Utilities'
                      WHEN sector = 'Utilidade Pública'
                           AND subsector = 'Gás'                               THEN 'Gas Utilities'
                      WHEN sector = 'Utilidade Pública'
                           AND subsector = 'Água e Saneamento'                 THEN 'Water & Sewer'
                      -- Petróleo. Gás e Biocombustíveis
                      WHEN sector = 'Petróleo. Gás e Biocombustíveis'
                           AND subsector = 'Petróleo. Gás e Biocombustíveis'  THEN 'Oil, Gas & Biofuels'
                      WHEN sector = 'Petróleo. Gás e Biocombustíveis'
                           AND subsector = 'Equipamentos e Serviços'           THEN 'Oil & Gas Equipment & Services'
                      WHEN sector = 'Petróleo. Gás e Biocombustíveis'
                           AND subsector = 'Exploração. Refino e Distribuição' THEN 'Oil & Gas Exploration & Production'
                      WHEN sector = 'Petróleo. Gás e Biocombustíveis'
                           AND subsector = 'Distribuição de Combustíveis'      THEN 'Fuel Distribution'
                      -- Saúde
                      WHEN sector = 'Saúde'
                           AND subsector = 'Medicamentos e Outros Produtos'    THEN 'Pharmaceuticals'
                      WHEN sector = 'Saúde'
                           AND subsector = 'Comércio e Distribuição'           THEN 'Pharmaceutical Distribution'
                      WHEN sector = 'Saúde'
                           AND subsector = 'Equipamentos'                      THEN 'Medical Equipment'
                      WHEN sector = 'Saúde'
                           AND subsector = 'Serv.Méd.Hospit..Análises e Diagnósticos' THEN 'Healthcare Services'
                      -- Tecnologia da Informação
                      WHEN sector = 'Tecnologia da Informação'
                           AND subsector = 'Computadores e Equipamentos'       THEN 'Computer Hardware'
                      WHEN sector = 'Tecnologia da Informação'
                           AND subsector = 'Programas e Serviços'              THEN 'Software & IT Services'
                      -- Comunicações
                      WHEN sector = 'Comunicações'
                           AND subsector = 'Telecomunicações'                  THEN 'Telecommunications'
                      WHEN sector = 'Comunicações'
                           AND subsector = 'Mídia'                             THEN 'Media & Entertainment'
                      -- Construção e Transporte
                      WHEN sector = 'Construção e Transporte'
                           AND subsector = 'Transporte'                        THEN 'Transportation Services'
                      WHEN sector = 'Construção e Transporte'
                           AND subsector = 'Construção e Engenharia'           THEN 'Construction'
                      ELSE 'Other'
                  END AS normalized_subsector
              FROM base
              ORDER BY sector, subsector

writer:
    layer: staging
    dataset: brasa-industry-sectors

fields:
    - name: sector
      description: B3 primary sector (Portuguese label, trimmed)
      type: string
    - name: subsector
      description: B3 subsector (Portuguese label, trimmed)
      type: string
    - name: gics_sector
      description: GICS standard sector mapped from sector
      type: string
    - name: icb_sector
      description: ICB standard sector mapped from sector
      type: string
    - name: normalized_sector
      description: English normalized name for sector (1-to-1 translation)
      type: string
    - name: normalized_subsector
      description: >
          English normalized subsector from (sector, subsector) tuple;
          falls back to 'Other' for unmapped combinations
      type: string
