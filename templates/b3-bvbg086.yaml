id: b3-bvbg086
filename: ~
filetype: CUSTOM
description: Arquivo de Preços de Mercado
calendar: Brazil/B3
locale: en
downloader:
  function: brasa.downloaders.datetime_download
  url: https://www.b3.com.br/pesquisapregao/download?filelist=PR%y%m%d.zip
  format: zip
  args:
    refdate: ~
reader:
  locale: en
  encoding: utf-8
  pipeline:
    # Step 1: Read and parse the gzipped BVBG086 XML file
    - step: b3_read_bvbg086_xml

    # Step 2: Apply field type conversions
    - step: apply_fields
      errors: coerce

writer:
  partitioning: [refdate]
fields:
- name: refdate
  description: Data de referência
  tag: TradDt/Dt
  type: date
- name: symbol
  description: Símbolo do ativo
  tag: SctyId/TckrSymb
  type: character
- name: security_id
  description: ID do ativo
  tag: FinInstrmId/OthrId/Id
  type: character
- name: security_proprietary
  description: Proprietário do ativo
  tag: FinInstrmId/OthrId/Tp/Prtry
  type: integer
- name: security_market
  description: Mercado do ativo
  tag: FinInstrmId/PlcOfListg/MktIdrCd
  type: character
- name: volume
  description: Volume financeiro
  tag: FinInstrmAttrbts/NtlFinVol
  type: numeric
- name: open_interest
  description: Posições em aberto
  tag: FinInstrmAttrbts/OpnIntrst
  type: numeric
- name: traded_contracts
  description: Quantidade de contratos negociada
  tag: FinInstrmAttrbts/FinInstrmQty
  type: numeric
- name: best_ask_price
  description: Melhor preço de venda
  tag: FinInstrmAttrbts/BestAskPric
  type: numeric
- name: best_bid_price
  description: Melhor preço de compra
  tag: FinInstrmAttrbts/BestBidPric
  type: numeric
- name: open
  description: Preço de abertura
  tag: FinInstrmAttrbts/FrstPric
  type: numeric
- name: low
  description: Preço mínimo
  tag: FinInstrmAttrbts/MinPric
  type: numeric
- name: high
  description: Preço máximo
  tag: FinInstrmAttrbts/MaxPric
  type: numeric
- name: close
  description: Preço de fechamento
  tag: FinInstrmAttrbts/LastPric
  type: numeric
- name: average
  description: Preço médio
  tag: FinInstrmAttrbts/TradAvrgPric
  type: numeric
- name: regular_transactions_quantity
  description: Quantidade de negócios no horário regular
  tag: FinInstrmAttrbts/RglrTxsQty
  type: integer
- name: regular_traded_contracts
  description: Quantidade de contratos negociados no horário regular
  tag: FinInstrmAttrbts/RglrTraddCtrcts
  type: integer
- name: regular_volume
  description: Volume financeiro no horário regular
  tag: FinInstrmAttrbts/NtlRglrVol
  type: numeric
- name: nonregular_transactions_quantity
  description: Quantidade de negócios fora do horário regular
  tag: FinInstrmAttrbts/NonRglrTxsQty
  type: integer
- name: nonregular_traded_contracts
  description: Quantidade de contratos fora do horário regular
  tag: FinInstrmAttrbts/NonRglrTraddCtrcts
  type: integer
- name: nonregular_volume
  description: Volume financeiro fora do horário regular
  tag: FinInstrmAttrbts/NtlNonRglrVol
  type: numeric
- name: oscillation
  description: Oscilação diária
  tag: FinInstrmAttrbts/OscnPctg
  type: numeric
- name: adjusted_quote
  description: Preço de ajuste (para futuros)
  tag: FinInstrmAttrbts/AdjstdQt
  type: numeric
- name: adjusted_tax
  description: Taxa de juros do preço de ajuste (para futuros)
  tag: FinInstrmAttrbts/AdjstdQtTax
  type: numeric
- name: previous_adjusted_quote
  description: Preço de ajuste anterior (para futuros)
  tag: FinInstrmAttrbts/PrvsAdjstdQt
  type: numeric
- name: previous_adjusted_tax
  description: Taxa de juros anterior do preço de ajuste (para futuros)
  tag: FinInstrmAttrbts/PrvsAdjstdQtTax
  type: numeric
- name: variation_points
  description: Variação em pontos
  tag: FinInstrmAttrbts/VartnPts
  type: numeric
- name: adjusted_value_contract
  description: Valor do contrato ajustado
  tag: FinInstrmAttrbts/AdjstdValCtrct
  type: numeric
- name: days_to_settlement
  description: Dias para liquidação
  tag: FinInstrmAttrbts/DaysToSttlm
  type: integer
- name: traded_quantity
  description: Quantidade negociada
  tag: TradDtls/TradQty
  type: integer
