id: b3-indexes-composition
description: Composição dos índices da B3
downloader:
  function: brasa.downloaders.b3_paged_url_encoded_download
  verifyssl: false
  url: https://sistemaswebb3-listados.b3.com.br/indexProxy/indexCall/GetStockIndex
  format: json
  encoding: latin1
  args:
    pageNumber: 1
    pageSize: 9999
  extra-key: date
reader:
  locale: pt
  function: brasa.readers.read_b3_indexes_composition
  encoding: latin1
  pipeline:
    - step: read_json
      path: results

    - step: add_column
      from:
        where: extra_key
      name: refdate

    # extract json fields and add as columns
    - step: b3_add_columns_from_json_fields
      mapping:
        # column_name: json_path
        update_date: header.update
        start_month: header.startMonth
        end_month: header.endMonth
        year: header.year

    - step: set_columns
      names:
        - corporation_name
        - specification_code
        - symbol
        - indexes
        - refdate
        - update_date
        - start_month
        - end_month
        - year

    - step: apply_fields
      errors: coerce
writer:
  layer: input
  partitioning: [refdate]
fields:
- name: corporation_name
  description: Nome da companhia
  type: character
- name: specification_code
  description: Código de especificação da ação
  type: character
- name: symbol
  description: Código da ação
  type: character
- name: indexes
  description: Lista de índexes separados por vírgula
  type: character
- name: refdate
  description: Data de referência
  type: date
- name: update_date
  description: Data de atualização do índice
  type: date
- name: start_month
  description: Mês de início de vigência do índice
  type: integer
- name: end_month
  description: Mês de fim de vigência do índice
  type: integer
- name: year
  description: Ano de criação do índice
  type: integer
