id: bcb-sgs-data
filename: ~
filetype: MCUSTOM
description: Obtém dados de séries temporais do SGS (Sistema Gerenciador de Séries Temporais) do Banco Central do Brasil.
locale: pt
downloader:
  function: brasa.downloaders.bcb_sgs_download
  validator: brasa.downloaders.validate_json_empty_file
  format: json
  args:
    code: ~
    refdate: ~
reader:
  function: brasa.readers.read_bcb_sgs_data
writer:
  partitioning: [refdate, code]
fields:
  - name: refdate
    description: Data de referência
    handler:
      type: Date
      format: "%Y-%m-%d"
  - name: value
    description: Valor
    handler:
      type: numeric
  - name: code
    description: Código da série (SGS)
    handler:
      type: integer
