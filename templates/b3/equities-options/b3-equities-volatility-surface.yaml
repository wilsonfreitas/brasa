# Migrated from legacy template using read_b3_equity_volatility_surface function
id: b3-equities-volatility-surface
description: Arquivo de Superfície de Volatilidade de Ações

downloader:
  function: brasa.downloaders.datetime_download
  url: https://www.b3.com.br/pesquisapregao/download?filelist=VE%y%m%d.ex_
  format: zip
  args:
    refdate: ~

reader:
  locale: pt
  pipeline:
    - step: read_csv
      separator: ";"
      skip: 1
      names: [underlying, type, maturity_date, business_days, current_days, delta, volatility]
    - step: add_column
      from:
        where: download_args
        key: refdate
      name: refdate
    - step: apply_fields
      errors: coerce

writer:
  layer: input
  partitioning: [refdate]

fields:
  - name: underlying
    description: Nome do ativo objeto
    type: character
  - name: type
    description: Tipo da opção (C = Call, V = Put)
    type: character
  - name: maturity_date
    description: Data de vencimento da opção
    type: date(format='%Y%m%d')
  - name: business_days
    description: Dias úteis até o vencimento
    type: integer
  - name: current_days
    description: Dias corridos até o vencimento
    type: integer
  - name: delta
    description: Delta da opção
    type: numeric
  - name: volatility
    description: Volatilidade
    type: numeric
  - name: refdate
    description: Data de referência
    type: date
