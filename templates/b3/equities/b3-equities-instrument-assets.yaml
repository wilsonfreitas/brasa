id: b3-equities-instrument-assets
description: |+
  Dataset de ativos de instrumentos listados na B3.
  Este dataset é utilizado para obter códigos de empresas
  listadas para fazer consulta no dataset b3-company-info.

  Utiliza os seguintes filtros:
  - Mercado à vista (instrument_market = 10)
  - Segmento de ações (instrument_segment = 1)
  - Exclui instrumentos como 'TAXA' e '9999-12-31'
  - Filtra por categorias específicas:
    - 11 - SHARES
    - 13 - UNIT

etl:
  pipeline:
    - step: sql_query
      datasets:
        - staging.b3-equities-register
      query: |+
        -- B3 Equities Register dataset
        select refdate, instrument_asset from (
          select
            distinct refdate, instrument_asset,
            row_number() over (partition by instrument_asset order by refdate desc) as row_num
          from
            'staging.b3-equities-register'
          where
            security_category in (11, 13)
            and instrument_market = 10
            and instrument_segment = 1
            and instrument_asset <> 'TAXA'
            and trading_start_date <> '9999-12-31'
        )
        where row_num = 1
        order by refdate
    - step: select_fields
    - step: apply_fields
      errors: coerce

writer:
  layer: staging

fields:
  - name: refdate
    description: Reference date
    type: date
  - name: instrument_asset
    description: Instrument asset code
    type: string
