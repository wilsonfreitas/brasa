        type: string
      - name: security_proprietary
        description: Security proprietary code
        tag: FinInstrmId/OthrId/Tp/Prtry
        type: string
      - name: security_market
        description: Security market code
        tag: FinInstrmId/PlcOfListg/MktIdrCd
