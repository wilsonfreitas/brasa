id: b3-cash-dividends-events
description: >
    Cash corporate events (dividends, interest on capital, income, capital returns)
    per company per share class. Primary source input.b3-cash-dividends (richer:
    yield %, prior-ex close, ratio; share_class from type_stock); falls back to
    input.b3-company-info-cash_dividends for events the primary source lacks (asset
    identified by ISIN, share_class parsed from the ISIN token, symbol resolved via
    staging.b3-companies-symbols). One row per event, latest snapshot kept. Company
    link keys resolved via staging.b3-companies-names.

etl:
  pipeline:
    - step: sql_query
      datasets:
        - input.b3-cash-dividends
        - input.b3-company-info-cash_dividends
        - staging.b3-companies-names
        - staging.b3-companies-symbols
      query: |+
        WITH names_by_trading AS (
            SELECT trading_name, code_cvm, issuing_company FROM (
                SELECT
                    trim(trading_name)        AS trading_name,
                    CAST(code_cvm AS VARCHAR) AS code_cvm,
                    instrument_asset          AS issuing_company,
                    ROW_NUMBER() OVER (
                        PARTITION BY trim(trading_name) ORDER BY refdate DESC
                    ) AS rn
                FROM 'staging.b3-companies-names'
            ) WHERE rn = 1
        ),
        names_by_company AS (
            SELECT issuing_company, code_cvm FROM (
                SELECT
                    instrument_asset          AS issuing_company,
                    CAST(code_cvm AS VARCHAR) AS code_cvm,
                    ROW_NUMBER() OVER (
                        PARTITION BY instrument_asset ORDER BY refdate DESC
                    ) AS rn
                FROM 'staging.b3-companies-names'
            ) WHERE rn = 1
        ),
        symbols AS (
            SELECT isin, symbol FROM (
                SELECT isin, symbol,
                    ROW_NUMBER() OVER (PARTITION BY isin ORDER BY symbol) AS rn
                FROM 'staging.b3-companies-symbols' WHERE isin IS NOT NULL
            ) WHERE rn = 1
        ),
        -- Primary source: dedup snapshots to the latest per event.
        -- DISTINCT ON (not a windowed QUALIFY) avoids a DuckDB internal binder
        -- error that triggers when a window result later feeds joins + UNION.
        primary_dedup AS (
            SELECT DISTINCT ON (
                trading_name, type_stock, corporate_action, last_date_prior_ex,
                date_approval, value_cash
            )
                trading_name, type_stock, corporate_action, last_date_prior_ex,
                date_approval, value_cash, ratio, corporate_action_price,
                closing_price_prior_ex_date
            FROM 'input.b3-cash-dividends'
            ORDER BY
                trading_name, type_stock, corporate_action, last_date_prior_ex,
                date_approval, value_cash, refdate DESC
        ),
        primary_rows AS (
            SELECT
                n.code_cvm,
                n.issuing_company,
                CAST(NULL AS VARCHAR) AS symbol,
                CAST(NULL AS VARCHAR) AS asset_isin,
                CASE
                    WHEN upper(p.type_stock) LIKE 'ON%'  THEN 'ON'
                    WHEN upper(p.type_stock) LIKE 'PN%'  THEN 'PN'
                    WHEN upper(p.type_stock) LIKE 'UNT%' THEN 'UNT'
                    ELSE upper(p.type_stock)
                END AS share_class,
                p.corporate_action            AS event_type_raw,
                p.last_date_prior_ex          AS ex_date,
                p.date_approval               AS approved_on,
                CAST(NULL AS DATE)            AS payment_date,
                p.value_cash                  AS value_cash,
                p.ratio                       AS ratio,
                p.corporate_action_price      AS yield_pct,
                p.closing_price_prior_ex_date AS prior_ex_close,
                CAST(NULL AS VARCHAR)         AS related_to,
                CAST(NULL AS VARCHAR)         AS isin,
                'b3-cash-dividends'           AS source
            FROM primary_dedup p
            LEFT JOIN names_by_trading n ON trim(p.trading_name) = n.trading_name
        ),
        -- Fallback source: dedup snapshots to the latest per event (DISTINCT ON
        -- for the same binder-safety reason as primary_dedup above).
        fallback_dedup AS (
            SELECT DISTINCT ON (
                issuingCompany, COALESCE(NULLIF(assetIssued, ''), isinCode),
                label, lastDatePrior, approvedOn, rate
            )
                issuingCompany, assetIssued, isinCode, label, rate, relatedTo,
                lastDatePrior, approvedOn, paymentDate
            FROM 'input.b3-company-info-cash_dividends'
            ORDER BY
                issuingCompany, COALESCE(NULLIF(assetIssued, ''), isinCode),
                label, lastDatePrior, approvedOn, rate, refdate DESC
        ),
        fallback AS (
            SELECT
                nc.code_cvm,
                f.issuingCompany AS issuing_company,
                sym.symbol       AS symbol,
                COALESCE(NULLIF(f.assetIssued, ''), f.isinCode) AS asset_isin,
                CASE
                    WHEN substr(COALESCE(NULLIF(f.assetIssued, ''), f.isinCode), 10, 2) = 'OR' THEN 'ON'
                    WHEN substr(COALESCE(NULLIF(f.assetIssued, ''), f.isinCode), 10, 1) = 'P'  THEN 'PN'
                    ELSE 'UNT'
                END AS share_class,
                f.label          AS event_type_raw,
                f.lastDatePrior  AS ex_date,
                f.approvedOn     AS approved_on,
                f.paymentDate    AS payment_date,
                f.rate           AS value_cash,
                CAST(NULL AS DOUBLE) AS ratio,
                CAST(NULL AS DOUBLE) AS yield_pct,
                CAST(NULL AS DOUBLE) AS prior_ex_close,
                f.relatedTo      AS related_to,
                f.isinCode       AS isin,
                'company-info'   AS source
            FROM fallback_dedup f
            LEFT JOIN names_by_company nc ON f.issuingCompany = nc.issuing_company
            LEFT JOIN symbols sym
                ON COALESCE(NULLIF(f.assetIssued, ''), f.isinCode) = sym.isin
        ),
        fallback_only AS (
            SELECT fb.* FROM fallback fb
            WHERE NOT EXISTS (
                SELECT 1 FROM primary_rows p
                WHERE p.issuing_company = fb.issuing_company
                  AND p.share_class    = fb.share_class
                  AND p.ex_date        = fb.ex_date
                  AND round(p.value_cash, 6) = round(fb.value_cash, 6)
            )
        )
        SELECT
            code_cvm, issuing_company, symbol, asset_isin, share_class,
            event_type_raw, ex_date, approved_on, payment_date, value_cash,
            ratio, yield_pct, prior_ex_close, related_to, isin, source
        FROM primary_rows
        UNION ALL
        SELECT
            code_cvm, issuing_company, symbol, asset_isin, share_class,
            event_type_raw, ex_date, approved_on, payment_date, value_cash,
            ratio, yield_pct, prior_ex_close, related_to, isin, source
        FROM fallback_only

writer:
  layer: staging
  dataset: b3-cash-dividends-events

fields:
  - name: code_cvm
    description: CVM company code (links to staging.brasa-companies)
    type: string
  - name: issuing_company
    description: B3 short company code (e.g. PETR, BBAS)
    type: string
  - name: symbol
    description: B3 ticker resolved from asset_isin (company-info rows only; else NULL)
    type: string
  - name: asset_isin
    description: ISIN of the specific share class (company-info rows only; else NULL)
    type: string
  - name: share_class
    description: Share class (ON, PN, UNT) from type_stock (primary) or ISIN token (fallback)
    type: string
  - name: event_type_raw
    description: Raw B3 cash-event label (DIVIDENDO, JRS CAP PROPRIO, ...)
    type: string
  - name: ex_date
    description: Last COM date (last trading day before going ex)
    type: date
  - name: approved_on
    description: Date the event was approved/declared
    type: date
  - name: payment_date
    description: Payment start date (company-info source only; else NULL)
    type: date
  - name: value_cash
    description: Cash value per share (R$)
    type: numeric
  - name: ratio
    description: Ratio (b3-cash-dividends source only; else NULL)
    type: numeric
  - name: yield_pct
    description: Provento/price yield % (b3-cash-dividends source only)
    type: numeric
  - name: prior_ex_close
    description: Closing price on the last COM date (b3-cash-dividends source only)
    type: numeric
  - name: related_to
    description: Reference period of the provento (company-info source only)
    type: string
  - name: isin
    description: Company ISIN code (company-info source only; else NULL)
    type: string
  - name: source
    description: Origin row source (b3-cash-dividends | company-info)
    type: string
