id: b3-stock-events
description: >
    Stock corporate events (splits, reverse splits, bonus shares, spinoffs, mergers,
    share-capital returns) per company per share class, from
    input.b3-company-info-stock_dividends. One row per event, latest snapshot kept.
    The asset is identified by its ISIN (asset_isin); share_class is parsed from the
    ISIN share-type token and symbol is resolved to a B3 ticker via
    staging.b3-companies-symbols (NULL for delisted/historical assets). Company link
    keys resolved via staging.b3-companies-names.

etl:
  pipeline:
    - step: sql_query
      datasets:
        - input.b3-company-info-stock_dividends
        - staging.b3-companies-names
        - staging.b3-companies-symbols
      query: |+
        -- Dedup snapshots BEFORE joining (a window over a join trips a DuckDB
        -- internal binder error), keeping the latest snapshot per event.
        WITH dedup AS (
            SELECT
                issuingCompany, assetIssued, isinCode, label, factor,
                approvedOn, lastDatePrior
            FROM 'input.b3-company-info-stock_dividends'
            QUALIFY ROW_NUMBER() OVER (
                PARTITION BY issuingCompany,
                             COALESCE(NULLIF(assetIssued, ''), isinCode),
                             label, lastDatePrior, approvedOn, factor
                ORDER BY refdate DESC
            ) = 1
        ),
        names_by_company AS (
            SELECT issuing_company, code_cvm FROM (
                SELECT
                    instrument_asset          AS issuing_company,
                    CAST(code_cvm AS VARCHAR) AS code_cvm,
                    ROW_NUMBER() OVER (
                        PARTITION BY instrument_asset ORDER BY refdate DESC
                    ) AS rn
                FROM 'staging.b3-companies-names'
            ) WHERE rn = 1
        ),
        symbols AS (
            SELECT isin, symbol FROM (
                SELECT isin, symbol,
                    ROW_NUMBER() OVER (PARTITION BY isin ORDER BY symbol) AS rn
                FROM 'staging.b3-companies-symbols' WHERE isin IS NOT NULL
            ) WHERE rn = 1
        )
        SELECT
            nc.code_cvm,
            d.issuingCompany AS issuing_company,
            sym.symbol       AS symbol,
            COALESCE(NULLIF(d.assetIssued, ''), d.isinCode) AS asset_isin,
            CASE
                WHEN substr(COALESCE(NULLIF(d.assetIssued, ''), d.isinCode), 10, 2) = 'OR' THEN 'ON'
                WHEN substr(COALESCE(NULLIF(d.assetIssued, ''), d.isinCode), 10, 1) = 'P'  THEN 'PN'
                ELSE 'UNT'
            END AS share_class,
            d.label          AS event_type_raw,
            d.factor         AS factor,
            d.approvedOn     AS approved_on,
            d.lastDatePrior  AS ex_date,
            d.isinCode       AS isin
        FROM dedup d
        LEFT JOIN names_by_company nc ON d.issuingCompany = nc.issuing_company
        LEFT JOIN symbols sym
            ON COALESCE(NULLIF(d.assetIssued, ''), d.isinCode) = sym.isin

writer:
  layer: staging
  dataset: b3-stock-events

fields:
  - name: code_cvm
    description: CVM company code (links to staging.brasa-companies)
    type: string
  - name: issuing_company
    description: B3 short company code (e.g. PETR, BBAS)
    type: string
  - name: symbol
    description: B3 ticker resolved from asset_isin (NULL for delisted/historical assets)
    type: string
  - name: asset_isin
    description: ISIN of the specific share class affected by the event
    type: string
  - name: share_class
    description: Share class parsed from the ISIN token (ON, PN, UNT)
    type: string
  - name: event_type_raw
    description: Raw B3 stock-event label (DESDOBRAMENTO, GRUPAMENTO, BONIFICACAO, ...)
    type: string
  - name: factor
    description: Percentage or grouping/split factor
    type: numeric
  - name: approved_on
    description: Date the event was approved/declared
    type: date
  - name: ex_date
    description: Last COM date (last trading day before going ex)
    type: date
  - name: isin
    description: Company ISIN code reported for the event (isinCode)
    type: string
