id: b3-curves-di1-standard-returns
description: Retornos da curva DI1 com vértices padronizados
etl:
  pipeline:
    - step: sql_query
      datasets:
        - staging.b3-curves-di1-standard
      query: |+
        -- First difference of the standard-term rate per vertex symbol.
        -- The first refdate of each symbol has a NULL return (no prior rate),
        -- matching the legacy create_rate_returns leading NaN.
        select
          refdate,
          symbol,
          adjusted_tax - lag(adjusted_tax)
            over (partition by symbol order by refdate) as returns
        from
          'staging.b3-curves-di1-standard'
        order by
          refdate, symbol

    - step: apply_fields
      errors: coerce

writer:
  layer: staging
  partitioning: []

fields:
  - name: refdate
    description: Reference date
    type: date
  - name: symbol
    description: Standard-term vertex symbol (e.g. DI1T252)
    type: string
  - name: returns
    description: First difference of the annualized rate (rate_t - rate_{t-1})
    type: numeric
