id: b3-indexes-historical-prices
description: Dados históricos de cotação dos índices da Bolsa

dependencies:
  - index:
      required: true
      from:
        datasets:
          - staging.b3-indexes-composition
        query: "select distinct indexes from 'staging.b3-indexes-composition'"

downloader:
  function: brasa.downloaders.b3_url_encoded_download
  validator: brasa.downloaders.validate_json_empty_file
  url: https://sistemaswebb3-listados.b3.com.br/indexStatisticsProxy/IndexCall/GetPortfolioDay
  format: json
  encoding: UTF-8
  download_delay: 1
  retry_attempts: 15
  retry_delay: 3.0
  retry_backoff: 2.0
  args:
    language: pt-br
    year: ~
    index: ~
reader:
  locale: pt
  encoding: UTF-8
  pipeline:
    # 1. Read the JSON file and extract the "Results" section
    - step: read_json
      path: results

    # 2. Add year column from download args
    - step: add_column
      name: year
      from:
        where: download_args
        key: year

    # 3. Add index column from download args
    - step: add_column
      name: index
      from:
        where: download_args
        key: index

    # 4. Apply field types
    - step: apply_fields
      set_columns: true
      errors: coerce

writer:
  layer: input
  partitioning: [index, year]

fields:
- name: day
  description: Dia do mês
  type: integer
- name: month01
  description: Coluna do mês de janeiro
  type: number(thousands=".", decimal=",")
- name: month02
  description: Coluna do mês de fevereiro
  type: number(thousands=".", decimal=",")
- name: month03
  description: Coluna do mês de março
  type: number(thousands=".", decimal=",")
- name: month04
  description: Coluna do mês de abril
  type: number(thousands=".", decimal=",")
- name: month05
  description: Coluna do mês de maio
  type: number(thousands=".", decimal=",")
- name: month06
  description: Coluna do mês de junho
  type: number(thousands=".", decimal=",")
- name: month07
  description: Coluna do mês de julho
  type: number(thousands=".", decimal=",")
- name: month08
  description: Coluna do mês de agosto
  type: number(thousands=".", decimal=",")
- name: month09
  description: Coluna do mês de setembro
  type: number(thousands=".", decimal=",")
- name: month10
  description: Coluna do mês de outubro
  type: number(thousands=".", decimal=",")
- name: month11
  description: Coluna do mês de novembro
  type: number(thousands=".", decimal=",")
- name: month12
  description: Coluna do mês de dezembro
  type: number(thousands=".", decimal=",")
- name: year
  description: Ano
  type: integer
- name: index
  description: Nome do índice
  type: character
