id: b3-indexes-current-portfolio
description: Carteira Teórica dos índices da B3 com pesos e quantidades por segmentos
downloader:
  function: brasa.downloaders.b3_url_encoded_download
  validator: brasa.downloaders.validate_json_empty_file
  url: https://sistemaswebb3-listados.b3.com.br/indexProxy/indexCall/GetPortfolioDay
  format: json
  encoding: UTF-8
  download_delay: 1.5
  args:
    pageNumber: 1
    pageSize: 9999
    language: pt-br
    segment: 2
    index: ~
  extra-key: date

reader:
  locale: pt
  encoding: latin1
  pipeline:
    - step: read_json
      path: results

    # extract json fields and add as columns
    - step: b3_add_columns_from_json_fields
      mapping:
        # column_name: json_path
        header_part: header.part
        header_theoricalQty: header.theoricalQty
        header_reductor: header.reductor
        portfolio_date: header.date

    - step: add_column
      name: index
      from:
        where: download_args
        key: index

    - step: add_column
      from:
        where: extra_key
      name: refdate

    - step: rename_columns
      mapping:
        cod: symbol
        asset: corporation_name
        type: specification_code
        part: weight
        partAcum: accum_weight
        theoricalQty: theoretical_quantity
        header_part: total_weight
        header_theoricalQty: total_theoretical_quantity
        header_reductor: reductor

    - step: apply_fields
      errors: coerce

writer:
  layer: input
  partitioning: [refdate, index]

fields:
- name: segment
  description: Código da ação
  type: character
- name: symbol
  description: Código da ação
  type: character
- name: corporation_name
  description: Nome da companhia
  type: character
- name: specification_code
  description: Código de especificação da ação
  type: character
- name: weight
  description: Peso % no índice
  type: number(thousands=".", decimal=",")
- name: accum_weight
  description: Peso % acumulado
  type: number(thousands=".", decimal=",")
- name: theoretical_quantity
  description: Quantidade teórica no índice
  type: number(thousands=".", decimal=",")
- name: total_weight
  description: Peso total % no índice
  type: number(thousands=".", decimal=",")
- name: total_theoretical_quantity
  description: Quantidade teórica total do índice
  type: number(thousands=".", decimal=",")
- name: reductor
  description: Redutor
  type: number(thousands=".", decimal=",")
- name: portfolio_date
  description: Data da carteira teórica
  type: date(format="%d/%m/%y")
- name: index
  description: Nome do índice
  type: character
- name: refdate
  description: Data de referência do download - argumento extra
  type: date
