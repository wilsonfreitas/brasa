id: brasa-industry-sectors
description: >
    Industry sector lookup table derived from staging.brasa-companies.
    Maps B3 sector hierarchy (sector_level1, sector_level2) to standard
    taxonomies (GICS, ICB) and a normalized English sector/subsector model.

etl:
    pipeline:
        - step: sql_query
          datasets:
              - staging.brasa-companies
          query: |+
              -- Industry sector lookup table
              --
              -- Derives distinct (sector_level1, sector_level2) pairs from staging.brasa-companies
              -- and maps each pair to GICS, ICB, normalized_sector, and normalized_subsector.
              --
              -- Output columns:
              -- - sector_level1: B3 primary sector (Portuguese label, trimmed)
              -- - sector_level2: B3 subsector (Portuguese label, trimmed)
              -- - gics_sector: GICS standard sector (from sector_level1)
              -- - icb_sector: ICB standard sector (from sector_level1)
              -- - normalized_sector: English normalized name for sector_level1
              -- - normalized_subsector: English normalized subsector from (sector_level1, sector_level2)
              WITH base AS (
                  SELECT DISTINCT
                      TRIM(sector_level1) AS sector_level1,
                      TRIM(sector_level2) AS sector_level2
                  FROM 'staging.brasa-companies'
                  WHERE sector_level1 IS NOT NULL
                    AND TRIM(sector_level1) <> ''
              )
              SELECT
                  sector_level1,
                  sector_level2,
                  -- GICS (Global Industry Classification Standard) mapping from sector_level1
                  CASE sector_level1
                      WHEN 'Financeiro'                      THEN 'Financials'
                      WHEN 'Bens Industriais'                THEN 'Industrials'
                      WHEN 'Materiais Básicos'               THEN 'Materials'
                      WHEN 'Consumo Cíclico'                 THEN 'Consumer Discretionary'
                      WHEN 'Consumo não Cíclico'             THEN 'Consumer Staples'
                      WHEN 'Utilidade Pública'               THEN 'Utilities'
                      WHEN 'Petróleo. Gás e Biocombustíveis' THEN 'Energy'
                      WHEN 'Saúde'                           THEN 'Health Care'
                      WHEN 'Tecnologia da Informação'        THEN 'Information Technology'
                      WHEN 'Comunicações'                    THEN 'Communication Services'
                      WHEN 'Imobiliário'                     THEN 'Real Estate'
                      WHEN 'Construção e Transporte'         THEN 'Industrials'
                      WHEN 'Outros'                          THEN 'Other'
                      WHEN 'Não Classificados'               THEN 'Unclassified'
                      WHEN 'Carga Inicial'                   THEN 'Unclassified'
                      ELSE 'Unclassified'
                  END AS gics_sector,
                  -- ICB (Industry Classification Benchmark) mapping from sector_level1
                  CASE sector_level1
                      WHEN 'Financeiro'                      THEN 'Financials'
                      WHEN 'Bens Industriais'                THEN 'Industrials'
                      WHEN 'Materiais Básicos'               THEN 'Basic Materials'
                      WHEN 'Consumo Cíclico'                 THEN 'Consumer Goods'
                      WHEN 'Consumo não Cíclico'             THEN 'Consumer Services'
                      WHEN 'Utilidade Pública'               THEN 'Utilities'
                      WHEN 'Petróleo. Gás e Biocombustíveis' THEN 'Oil & Gas'
                      WHEN 'Saúde'                           THEN 'Health Care'
                      WHEN 'Tecnologia da Informação'        THEN 'Technology'
                      WHEN 'Comunicações'                    THEN 'Telecommunications'
                      WHEN 'Imobiliário'                     THEN 'Real Estate'
                      WHEN 'Construção e Transporte'         THEN 'Industrials'
                      WHEN 'Outros'                          THEN 'Other'
                      WHEN 'Não Classificados'               THEN 'Unclassified'
                      WHEN 'Carga Inicial'                   THEN 'Unclassified'
                      ELSE 'Unclassified'
                  END AS icb_sector,
                  -- Normalized English sector name (1-to-1 translation of sector_level1)
                  CASE sector_level1
                      WHEN 'Financeiro'                      THEN 'Financials'
                      WHEN 'Bens Industriais'                THEN 'Industrials'
                      WHEN 'Materiais Básicos'               THEN 'Materials'
                      WHEN 'Consumo Cíclico'                 THEN 'Consumer Discretionary'
                      WHEN 'Consumo não Cíclico'             THEN 'Consumer Staples'
                      WHEN 'Utilidade Pública'               THEN 'Utilities'
                      WHEN 'Petróleo. Gás e Biocombustíveis' THEN 'Energy'
                      WHEN 'Saúde'                           THEN 'Health Care'
                      WHEN 'Tecnologia da Informação'        THEN 'Information Technology'
                      WHEN 'Comunicações'                    THEN 'Communication Services'
                      WHEN 'Imobiliário'                     THEN 'Real Estate'
                      WHEN 'Construção e Transporte'         THEN 'Construction & Transportation'
                      WHEN 'Outros'                          THEN 'Other'
                      WHEN 'Não Classificados'               THEN 'Unclassified'
                      WHEN 'Carga Inicial'                   THEN 'Unclassified'
                      ELSE 'Unclassified'
                  END AS normalized_sector,
                  -- Normalized English subsector from (sector_level1, sector_level2) tuple
                  CASE
                      -- Financeiro
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Intermediários Financeiros'        THEN 'Banking'
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Previdência e Seguros'             THEN 'Insurance & Pension Funds'
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Exploração de Imóveis'             THEN 'Real Estate'
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Securitizadoras de Recebíveis'     THEN 'Asset Management & Investment'
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Serviços Financeiros Diversos'     THEN 'Financial Services'
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Holdings Diversificadas'           THEN 'Holding Companies'
                      WHEN sector_level1 = 'Financeiro'
                           AND sector_level2 = 'Serviços Diversos'                 THEN 'Financial Services'
                      -- Bens Industriais
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Material de Transporte'            THEN 'Transportation Equipment'
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Máquinas e Equipamentos'           THEN 'Machinery & Equipment'
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Transporte'                        THEN 'Transportation Services'
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Construção e Engenharia'           THEN 'Construction'
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Serviços'                          THEN 'Industrial Services'
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Comércio'                          THEN 'Trade & Distribution'
                      WHEN sector_level1 = 'Bens Industriais'
                           AND sector_level2 = 'Tecnologia da Informação'          THEN 'Technology'
                      -- Materiais Básicos
                      WHEN sector_level1 = 'Materiais Básicos'
                           AND sector_level2 = 'Siderurgia e Metalurgia'           THEN 'Steel & Metals'
                      WHEN sector_level1 = 'Materiais Básicos'
                           AND sector_level2 = 'Mineração'                         THEN 'Mining'
                      WHEN sector_level1 = 'Materiais Básicos'
                           AND sector_level2 = 'Químicos'                          THEN 'Chemicals'
                      WHEN sector_level1 = 'Materiais Básicos'
                           AND sector_level2 = 'Madeira e Papel'                   THEN 'Timber & Pulp'
                      WHEN sector_level1 = 'Materiais Básicos'
                           AND sector_level2 = 'Embalagens'                        THEN 'Packaging'
                      WHEN sector_level1 = 'Materiais Básicos'
                           AND sector_level2 = 'Materiais Diversos'                THEN 'Other Materials'
                      -- Consumo Cíclico
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Automóveis e Motocicletas'         THEN 'Automobiles'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Comércio'                          THEN 'Retail'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Construção Civil'                  THEN 'Real Estate Development'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Hoteis e Restaurantes'             THEN 'Hotels & Restaurants'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Tecidos. Vestuário e Calçados'     THEN 'Apparel & Footwear'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Utilidades Domésticas'             THEN 'Home Appliances & Furnishings'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Viagens e Lazer'                   THEN 'Leisure & Travel'
                      WHEN sector_level1 = 'Consumo Cíclico'
                           AND sector_level2 = 'Diversos'                          THEN 'Diversified Consumer'
                      -- Consumo não Cíclico
                      WHEN sector_level1 = 'Consumo não Cíclico'
                           AND sector_level2 = 'Agropecuária'                      THEN 'Agriculture'
                      WHEN sector_level1 = 'Consumo não Cíclico'
                           AND sector_level2 = 'Alimentos Processados'             THEN 'Food & Beverage'
                      WHEN sector_level1 = 'Consumo não Cíclico'
                           AND sector_level2 = 'Bebidas'                           THEN 'Beverages'
                      WHEN sector_level1 = 'Consumo não Cíclico'
                           AND sector_level2 = 'Comércio e Distribuição'           THEN 'Retail & Distribution'
                      WHEN sector_level1 = 'Consumo não Cíclico'
                           AND sector_level2 = 'Produtos de Uso Pessoal e de Limpeza' THEN 'Personal Care & Hygiene'
                      WHEN sector_level1 = 'Consumo não Cíclico'
                           AND sector_level2 = 'Diversos'                          THEN 'Diversified Consumer'
                      -- Utilidade Pública
                      WHEN sector_level1 = 'Utilidade Pública'
                           AND sector_level2 = 'Energia Elétrica'                  THEN 'Electric Utilities'
                      WHEN sector_level1 = 'Utilidade Pública'
                           AND sector_level2 = 'Gás'                               THEN 'Gas Utilities'
                      WHEN sector_level1 = 'Utilidade Pública'
                           AND sector_level2 = 'Água e Saneamento'                 THEN 'Water & Sewer'
                      -- Petróleo. Gás e Biocombustíveis
                      WHEN sector_level1 = 'Petróleo. Gás e Biocombustíveis'
                           AND sector_level2 = 'Petróleo. Gás e Biocombustíveis'  THEN 'Oil, Gas & Biofuels'
                      WHEN sector_level1 = 'Petróleo. Gás e Biocombustíveis'
                           AND sector_level2 = 'Equipamentos e Serviços'           THEN 'Oil & Gas Equipment & Services'
                      WHEN sector_level1 = 'Petróleo. Gás e Biocombustíveis'
                           AND sector_level2 = 'Exploração. Refino e Distribuição' THEN 'Oil & Gas Exploration & Production'
                      WHEN sector_level1 = 'Petróleo. Gás e Biocombustíveis'
                           AND sector_level2 = 'Distribuição de Combustíveis'      THEN 'Fuel Distribution'
                      -- Saúde
                      WHEN sector_level1 = 'Saúde'
                           AND sector_level2 = 'Medicamentos e Outros Produtos'    THEN 'Pharmaceuticals'
                      WHEN sector_level1 = 'Saúde'
                           AND sector_level2 = 'Comércio e Distribuição'           THEN 'Pharmaceutical Distribution'
                      WHEN sector_level1 = 'Saúde'
                           AND sector_level2 = 'Equipamentos'                      THEN 'Medical Equipment'
                      WHEN sector_level1 = 'Saúde'
                           AND sector_level2 = 'Serv.Méd.Hospit..Análises e Diagnósticos' THEN 'Healthcare Services'
                      -- Tecnologia da Informação
                      WHEN sector_level1 = 'Tecnologia da Informação'
                           AND sector_level2 = 'Computadores e Equipamentos'       THEN 'Computer Hardware'
                      WHEN sector_level1 = 'Tecnologia da Informação'
                           AND sector_level2 = 'Programas e Serviços'              THEN 'Software & IT Services'
                      -- Comunicações
                      WHEN sector_level1 = 'Comunicações'
                           AND sector_level2 = 'Telecomunicações'                  THEN 'Telecommunications'
                      WHEN sector_level1 = 'Comunicações'
                           AND sector_level2 = 'Mídia'                             THEN 'Media & Entertainment'
                      -- Construção e Transporte
                      WHEN sector_level1 = 'Construção e Transporte'
                           AND sector_level2 = 'Transporte'                        THEN 'Transportation Services'
                      WHEN sector_level1 = 'Construção e Transporte'
                           AND sector_level2 = 'Construção e Engenharia'           THEN 'Construction'
                      ELSE 'Other'
                  END AS normalized_subsector
              FROM base
              ORDER BY sector_level1, sector_level2

writer:
    layer: staging
    dataset: brasa-industry-sectors

fields:
    - name: sector_level1
      description: B3 primary sector (Portuguese label, trimmed)
      type: string
    - name: sector_level2
      description: B3 subsector (Portuguese label, trimmed)
      type: string
    - name: gics_sector
      description: GICS standard sector mapped from sector_level1
      type: string
    - name: icb_sector
      description: ICB standard sector mapped from sector_level1
      type: string
    - name: normalized_sector
      description: English normalized name for sector_level1 (1-to-1 translation)
      type: string
    - name: normalized_subsector
      description: >
          English normalized subsector from (sector_level1, sector_level2) tuple;
          falls back to 'Other' for unmapped combinations
      type: string
