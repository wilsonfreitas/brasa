id: b3-equities-spot-market
description: >
  | Dataset de dados cadastrais de ações fitrando mercado à vista (instrument_market = 10),
  | segmento de ações (instrument_segment = 1) da B3 (Bolsa de Valores do Brasil)
  | e instrumentos válidos para análise de ações, excluindo instrumentos como 'TAXA' e '9999-12-31'
  | e filtrando por categorias específicas.
  |
  | 1 - BDR
  | 3 - ETF EQUITIES
  | 6 - FUNDS
  | 11 - SHARES
  | 13 - UNIT
  | 21 - ETF FOREIGN INDEX
etl:
  pipeline:
    - step: sql_query
      datasets:
        - staging.b3-equities-register
      query: |+
        -- B3 Equities Spot Market dataset
        select
          *
        from
          'staging.b3-equities-register'
        where
          instrument_market = 10 and
          instrument_segment = 1 and
          instrument_asset <> 'TAXA' and
          trading_start_date <> '9999-12-31' and
          security_category in (1, 11, 6, 21, 3, 13)

writer:
  layer: staging
