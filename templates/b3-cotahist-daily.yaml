id: b3-cotahist-daily
description: Cotações Históricas do Pregão de Ações - Arquivo Diário
downloader:
  verify_ssl: false
  function: brasa.downloaders.datetime_download
  url: https://bvmf.bmfbovespa.com.br/InstDados/SerHist/COTAHIST_D%d%m%Y.ZIP
  format: zip
  args:
    refdate: ~

reader:
  encoding: latin1
  locale: en
  pipeline:
    # Read fixed-width format file using widths derived from field definitions
    - step: read_fwf

    # Keep only type "01" records (historical prices)
    - step: filter_rows
      column: tipo_registro
      operator: eq
      value: "01"

    # Apply field type conversions from field definitions
    - step: apply_fields
      errors: coerce

writer:
  layer: input
  partitioning: [data_referencia]

fields:
  - name: tipo_registro
    description: Tipo de registro
    type: character
    width: 2
  - name: data_referencia
    description: Data do pregão
    type: date(format="%Y%m%d")
    width: 8
  - name: cod_bdi
    description: Código BDI
    type: character
    width: 2
  - name: cod_negociacao
    description: Código de negociação do papel
    type: character
    width: 12
  - name: tipo_mercado
    description: Tipo de mercado
    type: integer
    width: 3
  - name: nome_empresa
    description: Nome resumido da empresa emissora do papel
    type: character
    width: 12
  - name: especificacao
    description: Especificação do papel
    type: character
    width: 10
  - name: num_dias_mercado_termo
    description: Prazo em dias do mercado a termo
    type: integer
    width: 3
  - name: cod_moeda
    description: Moeda de referência
    type: character
    width: 4
  - name: preco_abertura
    description: Preço de abertura do papel
    type: number(dec=2)
    width: 13
  - name: preco_max
    description: Preço máximo do papel
    type: number(dec=2)
    width: 13
  - name: preco_min
    description: Preço mínimo do papel
    type: number(dec=2)
    width: 13
  - name: preco_med
    description: Preço médio do papel
    type: number(dec=2)
    width: 13
  - name: preco_ult
    description: Preço último negócio efetuado com o papel
    type: number(dec=2)
    width: 13
  - name: preco_melhor_oferta_compra
    description: Preço da melhor oferta de compra do papel
    type: number(dec=2)
    width: 13
  - name: preco_melhor_oferta_venda
    description: Preço da melhor oferta de venda do papel
    type: number(dec=2)
    width: 13
  - name: qtd_negocios
    description: Número de negócios efetuados com o papel
    type: integer
    width: 5
  - name: qtd_titulos_negociados
    description: Quantidade total de títulos negociados neste papel
    type: integer
    width: 18
  - name: volume_titulos_negociados
    description: Volume total de títulos negociados neste papel
    type: number(dec=2)
    width: 18
  - name: preco_exercicio
    description: Preço de exercício para o mercado de opções ou valor do contrato para o mercado de termo secundário
    type: number(dec=2)
    width: 13
  - name: indicador_correcao_preco_exercicio
    description: Indicador de correção de preços de exercícios ou valores de contrato para os mercados de opções, termo secundário ou futuro
    type: character
    width: 1
  - name: data_vencimento
    description: Data do vencimento para os mercados de opções, termo secundário ou futuro
    type: date(format="%Y%m%d")
    width: 8
  - name: fator_cot
    description: Fator de cotação do papel
    type: integer
    width: 7
  - name: preco_exercicio_pontos
    description: Preço de exercício em pontos para opções referenciadas em dólar ou valor de contrato em pontos para termo secundário
    type: number(dec=6)
    width: 13
  - name: cod_isin
    description: Código do papel no sistema ISIN
    type: character
    width: 12
  - name: num_dist
    description: Número de distribuição do papel
    type: integer
    width: 3
