# Pipeline-based version of b3-futures-settlement-prices template
# This template demonstrates the new pipeline approach for reading data
id: b3-futures-settlement-prices-pipeline
description: Preços de Ajustes Diários de Contratos Futuros (Pipeline Version)
downloader:
  verify_ssl: false
  function: brasa.downloaders.settlement_prices_download
  url: https://www2.bmf.com.br/pages/portal/bmfbovespa/lumis/lum-ajustes-do-pregao-ptBR.asp
  format: html
  encoding: latin1
  args:
    refdate: ~
reader:
  locale: pt
  encoding: latin1
  decimal: ","
  thousands: "."
  pipeline:
    # Step 1: Read the HTML file and extract tables
    - step: read_html
      attrs:
        id: tblDadosAjustes

    # Step 2: Select the first (and only) table
    - step: first_table

    # Step 3: Set column names
    - step: set_columns
      names:
        - commodity
        - maturity_code
        - previous_price
        - price
        - price_change
        - settlement_value

    # Step 4: Parse the reference date from HTML and store in context
    - step: b3_parse_refdate_from_html
      xpath: "//input[@id='dData1']"
      attribute: value
      store_as: refdate

    # Step 5: Add refdate column from context
    - step: add_column
      name: refdate
      from_context: refdate

    # Step 6: Forward fill commodity names (they only appear in first row of group)
    - step: b3_forward_fill_commodity
      column: commodity

    # Step 7: Extract just the commodity code from the name
    - step: b3_extract_commodity_code
      column: commodity

    # Step 8: Create the symbol by concatenating commodity and maturity
    - step: b3_create_symbol
      commodity_column: commodity
      maturity_column: maturity_code
      output_column: symbol

    # Step 9: Apply field type conversions
    - step: apply_fields
      errors: coerce

writer:
  partitioning: [refdate]
fields:
- name: commodity
  description: Nome e código da mercadoria
  type: character
- name: maturity_code
  description: Código de vencimento do contrato futuro com 3 caractéres
  type: character
- name: previous_price
  description: Preço de ajuste do dia anterior
  type: number
- name: price
  description: Preço de ajuste atual
  type: number
- name: price_change
  description: Variação do preço de ajuste
  type: number
- name: settlement_value
  description: Valor do ajuste por contrato (R$)
  type: number
- name: refdate
  description: Data de referência
  type: date(format="%d/%m/%Y")
- name: symbol
  description: Símbolo do contrato futuro
  type: character
