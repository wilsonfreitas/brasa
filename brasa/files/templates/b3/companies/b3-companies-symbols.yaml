id: b3-companies-symbols
description: >
    All traded symbols (tickers) for B3-listed companies, with ISIN.
    One row per traded symbol (ticker code), derived from the latest snapshot of
    input.b3-company-details. Rows without a ticker code (companies not actively
    traded or missing code data) are excluded.
    Company-level data lives in staging.brasa-companies.

etl:
  pipeline:
    - step: sql_query
      datasets:
        - input.b3-company-details
      query: |+
        -- B3 Company Symbols
        --
        -- One row per traded symbol (ticker), with ISIN and company linkage.
        --
        -- Source:
        -- - input.b3-company-details: one row per ticker per company per refdate.
        --   The `code` column holds the ticker symbol (e.g. PETR3, PETR4, AMER11).
        --   The `isin` column holds the ISIN for that specific ticker.
        --
        -- Strategy:
        -- Deduplicate to latest snapshot per (issuingCompany, code) pair using
        -- ROW_NUMBER() OVER (PARTITION BY issuingCompany, code ORDER BY refdate DESC).
        -- Only rows with a non-NULL code are included.
        WITH latest AS (
            SELECT *,
                   ROW_NUMBER() OVER (
                       PARTITION BY issuingCompany, code ORDER BY refdate DESC
                   ) AS rn
            FROM 'input.b3-company-details'
            WHERE code IS NOT NULL
        )
        SELECT
            code                         AS symbol,
            isin,
            issuingCompany               AS issuing_company,
            CAST(codeCVM AS VARCHAR)     AS code_cvm,
            market,
            CASE
                WHEN substr(isin, 7, 3) = 'ACN' THEN 'EQUITY'
                WHEN substr(isin, 7, 3) IN ('CDA', 'UNT') THEN 'UNIT'
                WHEN substr(isin, 7, 3) = 'BDR' THEN 'BDR'
                WHEN regexp_matches(substr(isin, 7, 3), '^D[A-Z]') THEN 'DEBENTURE'
                WHEN regexp_matches(substr(isin, 7, 3), '^D[0-9]') THEN 'SUBSCRIPTION_RIGHT'
                WHEN regexp_matches(substr(isin, 7, 3), '^[RN][0-9]') THEN 'SUBSCRIPTION_RECEIPT'
                ELSE 'OTHER'
            END AS instrument_type,
            CASE
                WHEN substr(isin, 7, 3) <> 'ACN' THEN NULL
                WHEN substr(isin, 10, 2) = 'OR' THEN 'ON'
                WHEN substr(isin, 10, 2) = 'PR' THEN 'PN'
                WHEN substr(isin, 10, 1) = 'P' THEN 'PN' || substr(isin, 11, 1)
                ELSE NULL
            END AS share_class
        FROM latest
        WHERE rn = 1
        ORDER BY symbol

writer:
  layer: staging
  dataset: b3-companies-symbols

fields:
  - name: symbol
    description: Traded ticker symbol (e.g. PETR3, PETR4, AMER11, JBSS32)
    type: string
  - name: isin
    description: ISIN code for this specific ticker
    type: string
  - name: issuing_company
    description: B3 short company code (e.g. PETR, BBAS) — links to staging.brasa-companies
    type: string
  - name: code_cvm
    description: CVM company code — links to staging.brasa-companies
    type: string
  - name: market
    description: Listing market (NOVO MERCADO, BOLSA, BOVESPA NIVEL 2, BDR / CDA, etc.)
    type: string
  - name: share_class
    description: >
        B3 equity share class parsed from the ISIN (ON, PN, PNA, PNB, PNC).
        Mirrors input.b3-cash-dividends.type_stock. NULL for non-equity instruments.
    type: string
  - name: instrument_type
    description: >
        Security family parsed from the ISIN (EQUITY, UNIT, BDR, DEBENTURE,
        SUBSCRIPTION_RIGHT, SUBSCRIPTION_RECEIPT, OTHER).
    type: string
