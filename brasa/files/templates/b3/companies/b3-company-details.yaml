id: b3-company-details
description: Informação suplementar das companhias listadas na Bolsa

dependencies:
  - codeCVM:
      required: true
      from:
        datasets:
          - staging.b3-companies-names
          - input.cvm-companies-registration
        # Exclude every codeCVM whose CVM registration status is CANCELADA.
        # B3's GetDetail endpoint returns an empty payload for cancelled/delisted
        # companies (marked INVALID on download), so filtering all CANCELADA
        # removes the bulk of those while keeping every active company.
        query: |
          SELECT DISTINCT n.code_cvm
          FROM 'staging.b3-companies-names' n
          WHERE n.code_cvm IS NOT NULL
            AND n.code_cvm NOT IN (
              SELECT TRY_CAST(code_cvm AS BIGINT)
              FROM 'input.cvm-companies-registration'
              WHERE sit = 'CANCELADA'
            )

downloader:
  function: brasa.downloaders.b3_url_encoded_download
  validator: brasa.downloaders.validate_json_empty_file
  url: https://sistemaswebb3-listados.b3.com.br/listedCompaniesProxy/CompanyCall/GetDetail
  format: json
  download_delay: 1
  retry_attempts: 3
  retry_delay: 3.0
  retry_backoff: 2.0
  args:
    codeCVM: ~
    language: pt-br
  extra-key: date

reader:
  locale: pt
  pipeline:
    steps:
      - step: b3_read_company_details_json
      - step: add_column
        name: codeCVMarg
        from:
          where: download_args
          key: codeCVM
      - step: add_column
        name: refdate
        from:
          where: extra_key
      - step: apply_fields

writer:
  partitioning: [codeCVMarg, refdate]

fields:
  - name: issuingCompany
    description: Código da empresa (sem o número)
    type: string
  - name: companyName
    description: Nome da companhia
    type: string
  - name: tradingName
    description: Nome de negociação
    type: string
  - name: cnpj
    description: CNPJ
    type: string
  - name: industryClassification
    description: Classificação (setor/subsetor/segmento)
    type: string
  - name: industryClassificationEng
    description: Classificação
    type: string
  - name: activity
    description: Ramo de atividade
    type: string
  - name: website
    description: Site
    type: string
  - name: hasQuotation
    description: Tem cotação?
    type: string
  - name: status
    description: Status
    type: string
  - name: marketIndicator
    description: Código indicador do mercado
    type: string
  - name: market
    description: Mercado (Novo mercado, ...)
    type: string
  - name: institutionCommon
    description: Instituição das ações ordinárias
    type: string
  - name: institutionPreferred
    description: Instituição das ações preferenciais
    type: string
  - name: code
    description: Código da empresa
    type: string
  - name: codeCVM
    description: Código CVM da empresa
    type: string
  - name: lastDate
    description: Última data de negociação
    type: string
  - name: hasEmissions
    description: Tem emissões
    type: string
  - name: hasBDR
    description: Tem BDRs?
    type: string
  - name: typeBDR
    description: Tipo de BDR
    type: string
  - name: describleCategoryBVMF
    description: Descrição
    type: string
  - name: isin
    description: Código ISIN
    type: string
  - name: codeCVMarg
    description: Código CVM da empresa
    type: string
  - name: refdate
    description: Data de referência
    type: date
