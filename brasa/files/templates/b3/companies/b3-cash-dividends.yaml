id: b3-cash-dividends
description: Listagem de dividendos em dinheiro

dependencies:
  - tradingName:
      required: true
      from:
        datasets:
          - staging.b3-companies-names
        query: "SELECT trading_name FROM 'staging.b3-companies-names'"

downloader:
  function: brasa.downloaders.b3_paged_url_encoded_download
  validator: brasa.downloaders.validate_json_empty_file
  url: https://sistemaswebb3-listados.b3.com.br/listedCompaniesProxy/CompanyCall/GetListedCashDividends
  format: json
  download_delay: 1
  retry_attempts: 15
  retry_delay: 3.0
  retry_backoff: 2.0
  args:
    tradingName: ~
    language: pt-br
    pageNumber: 1
    pageSize: 200
  extra-key: date

reader:
  locale: pt
  pipeline:
    steps:
      - step: read_json
        path: results

      - step: add_column
        name: refdate
        from:
          where: extra_key

      - step: add_column
        name: trading_name
        from:
          where: download_args
          key: tradingName

      - step: rename_columns
        mapping:
          typeStock: type_stock
          dateApproval: date_approval
          valueCash: value_cash
          corporateAction: corporate_action
          lastDatePriorEx: last_date_prior_ex
          dateClosingPricePriorExDate: date_closing_price_prior_ex_date
          closingPricePriorExDate: closing_price_prior_ex_date
          quotedPerShares: quoted_per_shares
          corporateActionPrice: corporate_action_price
          lastDateTimePriorEx: last_date_time_prior_ex

      - step: apply_fields
        error: coerce

writer:
  partitioning: [trading_name, refdate]

fields:
  - name: type_stock
    type: string
    description: Tipo da ação (ON, PN)
  - name: date_approval
    type: date(format="%d/%m/%Y")
    description: Data em que foi deliberado
  - name: value_cash
    description: Valor do dividendo
    type: numeric(thousands=".", decimal=",")
  - name: ratio
    description: Razão
    type: numeric(thousands=".", decimal=",")
  - name: corporate_action
    type: string
    description: Tipo do provento
  - name: last_date_prior_ex
    type: date(format="%d/%m/%Y")
    description: Data COM (última data antes da ação ficar EX do provento)
  - name: date_closing_price_prior_ex_date
    type: date(format="%d/%m/%Y")
    description: Data COM (última data antes da ação ficar EX do provento)
  - name: closing_price_prior_ex_date
    type: numeric(thousands=".", decimal=",")
    description: Último preço COM
  - name: quoted_per_shares
    type: numeric(thousands=".", decimal=",")
    description: Provento por ações
  - name: corporate_action_price
    type: numeric(thousands=".", decimal=",")
    description: Razão Provento/Preço (%)
  - name: last_date_time_prior_ex
    type: date(format="%Y-%m-%dT%H:%M:%S")
    description: Data/Hora COM (última data antes da ação ficar EX do provento)
  - name: refdate
    type: date(format="%Y-%m-%d")
    description: Data de referência do dado
  - name: trading_name
    type: string
    description: Nome de negociação do ativo.
