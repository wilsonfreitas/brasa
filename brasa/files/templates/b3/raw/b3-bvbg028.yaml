id: b3-bvbg028
description: >
  Cadastro diário de instrumentos listados na B3 (ações, opções sobre ações e
  contratos futuros), com dados de identificação, classificação, códigos ISIN/CFI,
  datas de negociação e parâmetros contratuais.
calendar: Brazil/B3

downloader:
  function: brasa.downloaders.datetime_download
  url: https://www.b3.com.br/pesquisapregao/download?filelist=IN%y%m%d.zip
  format: zip
  args:
    refdate: ~
reader:
  locale: en
  pipeline:
    steps:
      - b3_read_bvbg028_xml
      - apply_fields_multi

writer:
  partitioning: [refdate]

datasets:
  equities:
    tag: EqtyInf
