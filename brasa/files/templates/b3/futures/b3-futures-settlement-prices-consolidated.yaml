# Pipeline-based ETL template for consolidated futures data
# This template loads data from the input layer and stores in staging layer
# with the same dataset name (b3-futures-settlement-prices)
id: b3-futures-settlement-prices-consolidated
description: Consolidated futures settlement prices (repartitioned by commodity)

etl:
  pipeline:
    - step: load
      input: b3-futures-settlement-prices
      layer: input

writer:
  dataset: b3-futures-settlement-prices  # Same name as input, different layer!
  layer: staging
  partitioning: [commodity]

# Fields inherited from input dataset (b3-futures-settlement-prices)
# Uncomment to override:
